<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Maxwell Admin</title>
<style>
:root{--bg:#090b10;--nav:#0d1118;--panel:#121722;--panel2:#171e2b;--line:#293244;--text:#eef3ff;--muted:#9aa7bd;--dim:#667187;--blue:#4aa3ff;--green:#55d98b;--yellow:#e7b955;--red:#ff6475;--mono:"SF Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;--font:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.45}button,input,textarea,select{font:inherit}button{cursor:pointer}a{color:var(--blue);text-decoration:none}.hidden{display:none!important}
.login-wrap{min-height:100vh;display:grid;place-items:center;padding:24px}.login{width:min(390px,100%);background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px}.login h1{font-size:20px;margin:0 0 6px}.login p{margin:0 0 18px;color:var(--muted)}.err{min-height:20px;color:var(--red);font-size:13px}
.app{display:none;min-height:100vh}.app.authed{display:grid;grid-template-columns:240px 1fr}.side{background:var(--nav);border-right:1px solid var(--line);padding:16px;position:sticky;top:0;height:100vh}.brand{font-weight:800;font-size:16px;margin-bottom:4px}.sub{color:var(--muted);font-size:12px;margin-bottom:18px}.navbtn{display:block;width:100%;text-align:left;border:1px solid transparent;background:transparent;color:var(--muted);padding:9px 10px;border-radius:9px;margin:3px 0}.navbtn:hover{background:var(--panel);color:var(--text)}.navbtn.active{background:var(--panel2);border-color:var(--line);color:var(--text)}.side-bottom{position:absolute;left:16px;right:16px;bottom:16px;display:grid;gap:8px}
.main{min-width:0}.top{height:58px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:rgba(9,11,16,.92);position:sticky;top:0;z-index:3}.top h2{font-size:15px;margin:0}.top-actions{display:flex;gap:8px;align-items:center}.content{padding:18px;max-width:1420px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.grid.two{grid-template-columns:repeat(2,1fr)}.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px}.card h3{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:0 0 12px}.metric{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px}.metric b{display:block;font-size:24px;letter-spacing:-.03em}.metric span{color:var(--muted);font-size:12px}.panel{display:none}.panel.active{display:block}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.stack{display:grid;gap:8px}.field{width:100%;background:#090c12;border:1px solid var(--line);color:var(--text);border-radius:9px;padding:9px 10px;outline:none}.field:focus{border-color:var(--blue)}textarea.field{min-height:110px;resize:vertical}.btn{border:1px solid var(--line);background:#0b0f16;color:var(--text);border-radius:9px;padding:8px 10px}.btn:hover{border-color:var(--blue)}.btn.primary{background:var(--blue);border-color:var(--blue);color:#06101d;font-weight:700}.btn.green{border-color:rgba(85,217,139,.45);color:var(--green)}.btn.red{border-color:rgba(255,100,117,.45);color:var(--red)}.btn.small{padding:6px 8px;font-size:12px}.muted{color:var(--muted)}.mono{font-family:var(--mono);font-size:12px}.badge{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:3px 7px;color:var(--muted);font-size:12px}.badge.ok{border-color:rgba(85,217,139,.45);color:var(--green)}.badge.warn{border-color:rgba(231,185,85,.45);color:var(--yellow)}.badge.bad{border-color:rgba(255,100,117,.45);color:var(--red)}
.switchline{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding:10px 0}.switchline:last-child{border-bottom:0}.switch{position:relative;width:42px;height:24px;flex:0 0 auto}.switch input{opacity:0}.knob{position:absolute;inset:0;background:#263044;border-radius:999px}.knob:before{content:"";position:absolute;width:18px;height:18px;top:3px;left:3px;background:#8390a5;border-radius:50%;transition:.14s}input:checked+.knob{background:rgba(85,217,139,.35)}input:checked+.knob:before{transform:translateX(18px);background:var(--green)}
table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid var(--line);padding:9px;text-align:left;vertical-align:top}th{color:var(--muted);font-size:12px}.table{overflow:auto}.list{display:grid;gap:8px}.item{background:#090c12;border:1px solid var(--line);border-radius:10px;padding:10px}pre{margin:0;background:#090c12;border:1px solid var(--line);border-radius:10px;padding:12px;white-space:pre-wrap;max-height:420px;overflow:auto}.toast{position:fixed;right:18px;bottom:18px;background:var(--text);color:#05070b;border-radius:10px;padding:10px 12px;font-weight:700;opacity:0;pointer-events:none;transition:.16s}.toast.show{opacity:1}
@media(max-width:980px){.app.authed{display:block}.side{position:static;height:auto}.side-bottom{position:static;margin-top:14px}.grid,.grid.two{grid-template-columns:1fr}.top{position:static}.content{padding:12px}}
</style>
</head>
<body>
<div id="login" class="login-wrap"><form id="loginForm" class="login"><h1>Maxwell Admin</h1><p>Sign in to open the command center.</p><div class="stack"><input id="user" class="field" autocomplete="username" placeholder="Username"><input id="pass" class="field" type="password" autocomplete="current-password" placeholder="Password"><div id="error" class="err"></div><button class="btn primary" type="submit">Login</button><button id="clear" class="btn" type="button">Clear saved login</button></div></form></div>
<div id="app" class="app"><aside class="side"><div class="brand">Maxwell</div><div class="sub">Command Center</div><nav id="nav"></nav><div class="side-bottom"><a class="btn small" href="/">Main page</a><button id="logout" class="btn small red">Logout</button></div></aside><main class="main"><header class="top"><h2 id="title">Overview</h2><div class="top-actions"><span id="autoState" class="badge ok">auto 10s</span><span id="apiState" class="badge">API</span><button id="refresh" class="btn small primary">Refresh</button></div></header><div class="content"><section class="grid" id="metrics"></section><section id="overview" class="panel"></section><section id="commands" class="panel"></section><section id="discord" class="panel"></section><section id="dreams" class="panel"></section><section id="rem" class="panel"></section><section id="controls" class="panel"></section><section id="memory" class="panel"></section><section id="context" class="panel"></section><section id="logs" class="panel"></section><section id="raw" class="panel"></section></div></main></div><div id="toast" class="toast"></div>
<script>
const S={auth:null,tab:'overview',status:null,system:null,control:{},tools:[],memory:[],memoryJson:{},context:[],sites:{},prompts:{},blacklist:[],auto:[],commands:[],channels:[],discord:{guilds:[],dms:[]},rem:null,remRuns:[],pm2:[],logs:'',timer:null};
const T=[['overview','Overview'],['commands','Commands'],['discord','Discord'],['dreams','Dreaming'],['rem','REM'],['controls','Controls'],['memory','Memory'],['context','Context'],['logs','Logs'],['raw','Raw']];
const $=id=>document.getElementById(id);const esc=v=>String(v??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(t){const e=$('toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1800)}
function auth(){return S.auth?{'Authorization':'Basic '+btoa(S.auth.user+':'+S.auth.pass)}:{}}
async function api(url,opt={}){const r=await fetch(url,{...opt,headers:{...(opt.headers||{}),...auth()}});let d={};try{d=await r.json()}catch(e){}if(r.status===401){logout(false);throw Error('Unauthorized')}if(!r.ok)throw Error(d.error||'HTTP '+r.status);return d}
async function login(user,pass){const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user,pass})});const d=await r.json().catch(()=>({}));if(!r.ok||!d.ok)throw Error(d.error||'Login failed');S.auth={user,pass};localStorage.setItem('maxwellAuth',JSON.stringify(S.auth));$('login').classList.add('hidden');$('app').classList.add('authed');await loadAll()}
function logout(clear=true){if(clear)localStorage.removeItem('maxwellAuth');S.auth=null;$('app').classList.remove('authed');$('login').classList.remove('hidden')}
function badge(v,k=''){return `<span class="badge ${k}">${esc(v)}</span>`}function bytes(n){n=Number(n||0);if(n<1024)return n+'B';if(n<1048576)return(n/1024).toFixed(1)+'K';if(n<1073741824)return(n/1048576).toFixed(1)+'M';return(n/1073741824).toFixed(1)+'G'}function up(ms){if(!ms)return'-';const s=Math.max(0,Math.floor((Date.now()-Number(ms))/1000));return Math.floor(s/3600)+'h '+Math.floor((s%3600)/60)+'m'}
async function loadAll(){try{$('apiState').textContent='loading';$('apiState').className='badge warn';const [status,system,controlData,memory,memoryJson,context,sites,prompts,blacklist,auto,commands,channels,discord,rem,remRuns,pm2]=await Promise.all([api('/api/status'),api('/api/system'),api('/data/bot_control.json'),api('/data/long_term_memory.json'),api('/data/memory.json'),api('/api/context'),api('/data/sites.json'),api('/data/prompts.json'),api('/data/blacklist.json'),api('/data/auto_channels.json'),api('/api/commands'),api('/api/channels'),api('/api/discord/state'),api('/api/rem/status'),api('/api/rem/runs?limit=30'),api('/api/pm2')]);Object.assign(S,{status,system,control:controlData.control||{},tools:controlData.tools||[],memory:Array.isArray(memory)?memory:[],memoryJson:memoryJson||{},context:Array.isArray(context)?context:[],sites:sites||{},prompts:prompts||{},blacklist:Array.isArray(blacklist)?blacklist:[],auto:Array.isArray(auto)?auto:[],commands:Array.isArray(commands)?commands:[],channels:Array.isArray(channels)?channels:[],discord:discord&&typeof discord==='object'?discord:{guilds:[],dms:[]},rem,remRuns:Array.isArray(remRuns?.items)?remRuns.items:[],pm2:Array.isArray(pm2)?pm2:[]});$('apiState').textContent=status.online?'online':'offline';$('apiState').className='badge '+(status.online?'ok':'bad');render()}catch(e){$('apiState').textContent='error';$('apiState').className='badge bad';toast(e.message)}}
function render(){nav();metrics();overview();commands();discord();dreams();rem();controls();memory();context();logs();raw();document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id===S.tab));$('title').textContent=T.find(t=>t[0]===S.tab)?.[1]||'Admin'}
function nav(){$('nav').innerHTML=T.map(([id,l])=>`<button class="navbtn ${S.tab===id?'active':''}" data-tab="${id}">${l}</button>`).join('');document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{S.tab=b.dataset.tab;render()})}
function metrics(){const m=S.system?.memory||{},d=S.system?.disk||{},l=S.system?.load||['-'];$('metrics').innerHTML=[['Bot',S.status?.online?'online':'offline'],['Load',l[0]],['RAM',m.total_mb?Math.round(m.used_mb/m.total_mb*100)+'%':'-'],['Disk',d.total_bytes?Math.round(d.used_bytes/d.total_bytes*100)+'%':'-'],['Servers',(S.discord.guilds||[]).length],['DMs',(S.discord.dms||[]).length],['Context',S.context.length],['Commands',S.commands.length]].map(x=>`<div class="metric"><b>${esc(x[1])}</b><span>${esc(x[0])}</span></div>`).join('')}
function overview(){const bot=S.pm2.find(p=>p.name==='maxwell-bot')||{},ap=S.pm2.find(p=>p.name==='maxwell-api')||{};$('overview').innerHTML=`<div class="grid two" style="margin-top:12px"><div class="card"><h3>Processes</h3><div class="list"><div class="item"><b>maxwell-bot</b> ${badge(bot.status||'unknown',bot.status==='online'?'ok':'bad')}<div class="muted">uptime ${up(bot.uptime)} · restarts ${esc(bot.restart_time??0)} · cpu ${esc(bot.cpu??'-')}%</div><div class="row"><button class="btn small green" data-restart="maxwell-bot">Restart bot</button></div></div><div class="item"><b>maxwell-api</b> ${badge(ap.status||'unknown',ap.status==='online'?'ok':'bad')}<div class="muted">uptime ${up(ap.uptime)} · memory ${bytes(ap.memory)}</div><div class="row"><button class="btn small" data-restart="maxwell-api">Restart API</button></div></div></div></div><div class="card"><h3>Live Discord Snapshot</h3><div class="item"><b>${esc((S.discord.guilds||[]).length)} servers</b><div class="muted">${esc((S.discord.dms||[]).length)} DM/group channels · updated ${esc(S.discord.updated_at||'not yet')}</div></div><div class="row"><button class="btn small" onclick="S.tab='discord';render()">Open Discord panel</button></div></div></div>`;bindOps()}
function commands(){$('commands').innerHTML=`<div class="grid two" style="margin-top:12px"><div class="card"><h3>Send Server/Channel Message</h3><div class="stack"><input id="chan" class="field" placeholder="Channel ID"><textarea id="msg" class="field" placeholder="Message"></textarea><button id="send" class="btn primary">Queue send</button></div></div><div class="card"><h3>Send DM</h3><div class="stack"><input id="dmuser" class="field" placeholder="Discord user ID"><textarea id="dmmsg" class="field" placeholder="DM message"></textarea><button id="senddm" class="btn primary">Queue DM</button></div></div><div class="card"><h3>Shell Command</h3><div class="stack"><textarea id="shell" class="field" placeholder="Command"></textarea><button id="runshell" class="btn red">Queue shell</button></div></div><div class="card"><h3>Safe Commands</h3><div class="row"><button class="btn small" onclick="queue('reload_controls')">Reload controls</button><button class="btn small" onclick="queue('rem_run')">Run REM</button></div><p class="muted">Forced client-close command removed. Use PM2 restart in Overview if you need a restart.</p></div></div><div class="card" style="margin-top:12px"><h3>Command History</h3><div class="list">${S.commands.slice(-40).reverse().map(c=>`<div class="item"><b>${esc(c.type)}</b> ${badge(c.status||'pending',c.status==='done'?'ok':'warn')}<div class="mono muted">${esc(c.id)} ${esc(c.result||'')}</div></div>`).join('')||'<div class="muted">No commands.</div>'}</div></div>`;$('send').onclick=()=>queue('send_message',{channel_id:$('chan').value,content:$('msg').value});$('senddm').onclick=()=>queue('send_dm',{user_id:$('dmuser').value,content:$('dmmsg').value});$('runshell').onclick=()=>queue('shell',{command:$('shell').value})}

function discord(){const guilds=S.discord.guilds||[],dms=S.discord.dms||[];$('discord').innerHTML=`<div class="grid two" style="margin-top:12px"><div class="card"><h3>Servers from Discord</h3><p class="muted">This is snapshotted by the running Discord client, not inferred from memory.</p><div class="list">${guilds.map(g=>`<div class="item"><b>${esc(g.name)}</b><div class="mono muted">${esc(g.id)} · ${esc((g.channels||[]).length)} text channels · ${esc(g.member_count??'?')} members</div><div class="list" style="margin-top:8px">${(g.channels||[]).slice(0,12).map(ch=>`<button class="btn small" onclick="S.tab='commands';render();setTimeout(()=>{$('chan').value='${esc(ch.id)}'},0)">#${esc(ch.name)}</button>`).join('')}</div></div>`).join('')||'<div class="muted">No server snapshot yet. Wait up to 60 seconds after bot restart.</div>'}</div></div><div class="card"><h3>DM / Group Channels</h3><div class="list">${dms.map(dm=>`<div class="item"><b>${esc(dm.name)}</b><div class="mono muted">channel ${esc(dm.id)} ${dm.recipient_id?'· user '+esc(dm.recipient_id):''}</div>${dm.recipient_id?`<button class="btn small" onclick="S.tab='commands';render();setTimeout(()=>{$('dmuser').value='${esc(dm.recipient_id)}'},0)">DM this user</button>`:''}</div>`).join('')||'<div class="muted">No DM snapshot yet.</div>'}</div></div></div>`}

function dreams(){const runs=S.remRuns||[];$('dreams').innerHTML=`<div class="grid two" style="margin-top:12px"><div class="card"><h3>Dream Engine</h3><p class="muted">Dreaming is Maxwell's REM loop: it wakes up on a timer, reads recent visible chat events, and writes a dream audit of what it noticed. Use this to see what Maxwell is thinking about and tune how useful those dreams are.</p><div class="item">${badge(S.rem?.enabled?'dreaming enabled':'dreaming disabled',S.rem?.enabled?'ok':'bad')}<div class="muted">running ${S.rem?.running?'yes':'no'} · interval ${esc(S.rem?.interval_s??0)}s · max turns ${esc(S.rem?.max_turns??0)} · buffered events ${esc(S.rem?.events_buffered??0)}</div></div><div class="row"><button class="btn small primary" data-rem="run">Dream now</button><button class="btn small green" data-rem="enable">Enable dreaming</button><button class="btn small red" data-rem="disable">Disable dreaming</button></div></div><div class="card"><h3>Dream Settings</h3><div class="stack"><label class="muted">Interval seconds</label><input id="dreamInterval" class="field" type="number" min="10" max="86400" value="${esc(S.rem?.interval_s??600)}"><label class="muted">Max dream turns</label><input id="dreamTurns" class="field" type="number" min="0" max="10" value="${esc(S.rem?.max_turns??3)}"><label class="muted">Dream prompt</label><textarea id="dreamPrompt" class="field" style="min-height:170px" placeholder="Tell Maxwell how to dream usefully.">${esc(S.rem?.prompt||'')}</textarea><button id="saveDream" class="btn primary">Save dream settings</button></div></div></div><div class="card" style="margin-top:12px"><h3>Dream Journal</h3><p class="muted">Newest dreams first. These are REM audits: what Maxwell saw in the buffered slice, what patterns it noticed, and whether it changed memory.</p><div class="list">${runs.map(r=>`<div class="item"><div class="row"><b>${esc(r.ts||'unknown time')}</b>${badge((r.events??0)+' events',r.events?'ok':'')}${badge((r.turns_used??0)+' turns')}</div><pre style="margin-top:8px;max-height:260px">${esc(r.audit||'No audit text.')}</pre></div>`).join('')||'<div class="muted">No dreams recorded yet. Click Dream now after some chat has happened.</div>'}</div></div>`;$('saveDream').onclick=async()=>{await api('/api/rem/config',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({interval_seconds:$('dreamInterval').value,max_turns:$('dreamTurns').value,prompt:$('dreamPrompt').value})});toast('Dream settings saved');loadAll()};bindOps()}

function rem(){$('rem').innerHTML=`<div class="grid two" style="margin-top:12px"><div class="card"><h3>What REM Does</h3><p class="muted">REM is Maxwell's background memory/dream loop. It reads recent visible events, summarizes useful patterns, and can update long-term memory/context so the bot slowly assimilates what happened while chatting.</p><div class="item">${badge(S.rem?.enabled?'enabled':'disabled',S.rem?.enabled?'ok':'')}<div class="muted">running ${S.rem?.running?'yes':'no'} · interval ${esc(S.rem?.interval_s??0)}s · buffered events ${esc(S.rem?.events_buffered??0)}</div></div><div class="row"><button class="btn small" data-rem="run">Run now</button><button class="btn small green" data-rem="enable">Enable</button><button class="btn small red" data-rem="disable">Disable</button></div></div><div class="card"><h3>Last Audit</h3><pre>${esc(S.rem?.last_audit_preview||'No REM audit yet.')}</pre></div></div>`;bindOps()}
function controls(){const bools=['bot_enabled','reply_dms','reply_groups','reply_mentions','auto_mode_enabled','tools_enabled','store_memory','cross_context_enabled','cross_context_extract_enabled','process_images'];$('controls').innerHTML=`<div class="grid two" style="margin-top:12px"><div class="card"><h3>Runtime Switches</h3>${bools.map(k=>`<label class="switchline"><span>${esc(k.replaceAll('_',' '))}</span><span class="switch"><input data-bool="${k}" type="checkbox" ${S.control[k]?'checked':''}><span class="knob"></span></span></label>`).join('')}<button id="saveSwitch" class="btn primary">Save switches</button></div><div class="card"><h3>Tools</h3>${S.tools.map(t=>`<label class="switchline"><span class="mono">${esc(t)}</span><span class="switch"><input data-tool="${esc(t)}" type="checkbox" ${!(S.control.disabled_tools||[]).includes(t)?'checked':''}><span class="knob"></span></span></label>`).join('')}<button id="saveTools" class="btn primary">Save tools</button></div></div><div class="card" style="margin-top:12px"><h3>Base Personality</h3><textarea id="persona" class="field">${esc(S.control.base_personality||'')}</textarea><button id="savePersona" class="btn primary">Save personality</button></div>`;$('saveSwitch').onclick=()=>saveControl(Object.fromEntries([...document.querySelectorAll('[data-bool]')].map(i=>[i.dataset.bool,i.checked])));$('saveTools').onclick=()=>saveControl({disabled_tools:[...document.querySelectorAll('[data-tool]')].filter(i=>!i.checked).map(i=>i.dataset.tool)});$('savePersona').onclick=()=>saveControl({base_personality:$('persona').value})}
function memory(){$('memory').innerHTML=`<div class="card" style="margin-top:12px"><h3>Add Memory</h3><textarea id="newmem" class="field"></textarea><button id="addmem" class="btn primary">Add</button></div><div class="card" style="margin-top:12px"><h3>Long-Term Memory</h3><div class="table"><table><thead><tr><th>ID</th><th>Content</th><th></th></tr></thead><tbody>${S.memory.map(m=>`<tr><td class="mono">${esc(m.id)}</td><td><textarea class="field" data-mem="${esc(m.id)}">${esc(m.content)}</textarea></td><td><button class="btn small" data-save-mem="${esc(m.id)}">Save</button> <button class="btn small red" data-del-mem="${esc(m.id)}">Delete</button></td></tr>`).join('')}</tbody></table></div></div>`;$('addmem').onclick=async()=>{await api('/api/memory',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:$('newmem').value})});toast('Memory added');loadAll()};document.querySelectorAll('[data-save-mem]').forEach(b=>b.onclick=async()=>{const id=b.dataset.saveMem;await api('/api/memory',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,content:document.querySelector(`[data-mem="${CSS.escape(id)}"]`).value})});toast('Memory saved');loadAll()});document.querySelectorAll('[data-del-mem]').forEach(b=>b.onclick=async()=>{await api('/api/memory?id='+encodeURIComponent(b.dataset.delMem),{method:'DELETE'});toast('Memory deleted');loadAll()})}
function context(){
  $('context').innerHTML=`<div class="card" style="margin-top:12px">
    <h3>Add Context</h3>
    <div class="stack">
      <div class="row">
        <select id="ctx_type" class="field" style="max-width:200px">
          <option value="global">Global</option>
          <option value="user">User-Specific</option>
          <option value="channel">Channel-Specific</option>
          <option value="guild">Guild-Specific</option>
          <option value="custom">Custom Scope</option>
        </select>
        <input id="ctx_id" class="field hidden" placeholder="Target ID">
        <input id="ctx_custom_scope" class="field hidden" value="global" placeholder="Scope name">
      </div>
      <div class="row">
        <select id="ctx_visibility" class="field" style="max-width:200px">
          <option value="shared">Shared Visibility</option>
          <option value="private">Private Visibility</option>
        </select>
        <select id="ctx_importance" class="field" style="max-width:200px">
          <option value="1">Importance 1 (Low)</option>
          <option value="2">Importance 2</option>
          <option value="3">Importance 3</option>
          <option value="4">Importance 4</option>
          <option value="5">Importance 5 (Medium)</option>
          <option value="6">Importance 6</option>
          <option value="7">Importance 7</option>
          <option value="8" selected>Importance 8 (High)</option>
          <option value="9">Importance 9</option>
          <option value="10">Importance 10 (Critical)</option>
        </select>
      </div>
      <textarea id="ctxcontent" class="field" placeholder="Fact"></textarea>
      <button id="addctx" class="btn primary">Add fact</button>
    </div>
  </div>
  <div class="card" style="margin-top:12px">
    <h3>Facts</h3>
    <div class="list">
      ${S.context.map(f=>`
        <div class="item" style="display:flex; justify-content:space-between; align-items:flex-start; gap:12px;">
          <div>
            <b>${esc(f.scope)}</b> ${badge('i'+f.importance, f.importance>=8?'ok':f.importance>=5?'warn':'bad')}
            <div style="margin-top:4px">${esc(f.content)}</div>
            <div class="mono muted" style="margin-top:4px">${esc(f.id)} · ${esc(f.visibility)}</div>
          </div>
          <button class="btn small red" data-del-ctx="${esc(f.id)}">Delete</button>
        </div>
      `).join('')||'<div class="muted">No facts.</div>'}
    </div>
  </div>`;

  $('ctx_type').onchange=()=>{
    const t=$('ctx_type').value;
    if(t==='global'){
      $('ctx_id').classList.add('hidden');
      $('ctx_custom_scope').classList.add('hidden');
    }else if(t==='custom'){
      $('ctx_id').classList.add('hidden');
      $('ctx_custom_scope').classList.remove('hidden');
    }else{
      $('ctx_id').classList.remove('hidden');
      $('ctx_custom_scope').classList.add('hidden');
      $('ctx_id').placeholder=t.charAt(0).toUpperCase()+t.slice(1)+' ID';
    }
  };

  $('addctx').onclick=async()=>{
    const t=$('ctx_type').value;
    let scope='global';
    if(t==='custom'){
      scope=$('ctx_custom_scope').value.trim()||'global';
    }else if(t!=='global'){
      const id=$('ctx_id').value.trim();
      if(!id){
        toast('Please enter a '+t+' ID');
        return;
      }
      scope=t+':'+id;
    }
    const content=$('ctxcontent').value.trim();
    if(!content){
      toast('Please enter the fact content');
      return;
    }
    await api('/api/context',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        scope,
        content,
        importance:parseInt($('ctx_importance').value)||8,
        visibility:$('ctx_visibility').value,
        tags:['manual']
      })
    });
    toast('Context added');
    loadAll();
  };

  document.querySelectorAll('[data-del-ctx]').forEach(b=>b.onclick=async()=>{
    if(confirm('Are you sure you want to delete this fact?')){
      await api('/api/context?id='+encodeURIComponent(b.dataset.delCtx),{method:'DELETE'});
      toast('Context deleted');
      loadAll();
    }
  });
}
function logs(){$('logs').innerHTML=`<div class="card" style="margin-top:12px"><h3>PM2 Logs</h3><div class="row"><select id="logproc" class="field" style="max-width:220px"><option>maxwell-bot</option><option>maxwell-api</option></select><button id="loadlogs" class="btn primary">Load</button></div><pre>${esc(S.logs||'Pick a process and load logs.')}</pre></div>`;$('loadlogs').onclick=async()=>{const d=await api('/api/pm2/logs?process='+encodeURIComponent($('logproc').value)+'&lines=160');S.logs=d.log||'';logs()}}
function raw(){$('raw').innerHTML=`<div class="grid two" style="margin-top:12px"><div class="card"><h3>control</h3><pre>${esc(JSON.stringify(S.control,null,2))}</pre></div><div class="card"><h3>memory</h3><pre>${esc(JSON.stringify(S.memoryJson,null,2))}</pre></div><div class="card"><h3>sites</h3><pre>${esc(JSON.stringify(S.sites,null,2))}</pre></div><div class="card"><h3>prompts</h3><pre>${esc(JSON.stringify(S.prompts,null,2))}</pre></div></div>`}
async function queue(type,body={}){await api('/api/commands',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type,...body})});toast('Queued');loadAll()}async function saveControl(body){const d=await api('/api/control',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});S.control=d.control;toast('Saved');render()}function bindOps(){document.querySelectorAll('[data-restart]').forEach(b=>b.onclick=async()=>{await api('/api/pm2/restart?target='+b.dataset.restart,{method:'POST'});toast('Restarted');setTimeout(loadAll,1200)});document.querySelectorAll('[data-rem]').forEach(b=>b.onclick=async()=>{const m=b.dataset.rem;await api('/api/rem/'+(m==='run'?'run':m),{method:'POST'});toast('REM updated');loadAll()})}
$('loginForm').onsubmit=async e=>{e.preventDefault();$('error').textContent='';try{await login($('user').value.trim(),$('pass').value)}catch(err){$('error').textContent=err.message}};$('clear').onclick=()=>{localStorage.removeItem('maxwellAuth');$('user').value='';$('pass').value=''};$('logout').onclick=()=>logout(true);$('refresh').onclick=loadAll;S.timer=setInterval(()=>{if(S.auth)loadAll()},10000);
(function(){const raw=localStorage.getItem('maxwellAuth');if(raw){try{const old=JSON.parse(raw);const a={user:old.user||old.u,pass:old.pass||old.p};if(a.user&&a.pass){$('user').value=a.user;S.auth=a;localStorage.setItem('maxwellAuth',JSON.stringify(a));$('login').classList.add('hidden');$('app').classList.add('authed');loadAll();return}}catch(e){}}logout(false)})();
</script>
</body>
</html>
